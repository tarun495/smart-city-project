<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>News | SmartCity</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" href="/home">🏙️ SmartCity</a>
    <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/map">City Map</a></li>
        <li><a href="/history">History</a></li>
        <li><a href="/news">News</a></li>
        <li><a href="/business">Business</a></li>
        <li><a href="/forum">Forum</a></li>
        <li><a href="/search">Search</a></li>
        <li><a href="/auth/login">Login</a></li>
        <li><a href="/auth/register">Register</a></li>
        <li><a href="/auth/logout">Logout</a></li>
    </ul>
</nav>

<div class="section">
    <h2 class="section-title">📰 City <span>News</span></h2>
    <div class="grid-3">
        <div class="card" th:each="article : ${articles}">
            <small style="color:#e94560; font-weight:600;"
                   th:text="${article.category}">Category</small>
            <h3 style="margin:10px 0;"
                th:text="${article.title}">Title</h3>
            <p th:text="${#strings.abbreviate(
                            article.content, 120)}">
                Content...</p>
            <br/>
            <div style="display:flex;
                        justify-content:space-between;
                        align-items:center;">
                <small style="color:#999;"
                       th:text="${article.author}">Author</small>
                <a th:href="@{/news/{id}(id=${article.id})}"
                   class="btn btn-primary btn-sm">Read More</a>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(articles)}"
             style="grid-column:1/-1; text-align:center;">
            <p>No news articles yet. Check back soon!</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 SmartCity Portal |
        <a href="/news">News</a> |
        <a href="/map">Map</a> |
        <a href="/forum">Forum</a>
    </p>
</footer>
</body>
</html>
