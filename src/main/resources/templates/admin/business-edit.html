<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Business | Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav class="navbar">
    <a class="brand" href="/home">🏙️ SmartCity</a>
    <ul>
        <li><a href="/admin">⚙️ Admin</a></li>
        <li><a href="/admin/business">← Business</a></li>
        <li><a href="/auth/logout">Logout</a></li>
    </ul>
</nav>
<div class="section">
    <h2 class="section-title">✏️ Edit <span>Business</span></h2>
    <div class="card" style="max-width:700px; margin:0 auto;">
        <form th:action="@{/admin/business/edit/{id}
                         (id=${business.id})}"
              th:object="${business}" method="post">
            <div class="form-group">
                <label>Business Name</label>
                <input type="text"
                       th:field="*{name}" required/>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select th:field="*{category}">
                    <option value="HOTEL">Hotel</option>
                    <option value="RESTAURANT">Restaurant</option>
                    <option value="RETAIL">Retail</option>
                    <option value="BUSINESS">Business</option>
                    <option value="TOURISM">Tourism</option>
                    <option value="HOSPITAL">Hospital</option>
                    <option value="EDUCATION">Education</option>
                </select>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" th:field="*{address}"/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}"
                          rows="3"></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Latitude</label>
                    <input type="number"
                           th:field="*{latitude}"
                           step="0.0001"/>
                </div>
                <div class="form-group">
                    <label>Longitude</label>
                    <input type="number"
                           th:field="*{longitude}"
                           step="0.0001"/>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}"/>
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" th:field="*{website}"/>
                </div>
            </div>
            <div class="form-group">
                <label style="display:flex;
                               align-items:center; gap:8px;">
                    <input type="checkbox"
                           th:field="*{featured}"/>
                    Featured Business
                </label>
            </div>
            <button type="submit" class="btn btn-primary">
                Update Business
            </button>
            &nbsp;
            <a href="/admin/business"
               class="btn btn-danger">Cancel</a>
        </form>
    </div>
</div>
<footer><p>© 2026 SmartCity Admin</p></footer>
</body>
</html>
