<!DOCTYPE html>
<html>
<head>
    <title>Manage Business | SmartCity Admin</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial, sans-serif;
               background:#f4f6f9; color:#333; }
        .navbar { background:#1a1a2e; padding:15px 30px;
                  display:flex; justify-content:space-between;
                  align-items:center; }
        .navbar .brand { color:#e94560; font-size:22px;
                         font-weight:700;
                         text-decoration:none; }
        .navbar ul { list-style:none; display:flex; gap:20px; }
        .navbar ul li a { color:#ccc; text-decoration:none;
                          font-size:14px; }
        .section { padding:30px; }
        .section-title { font-size:26px; font-weight:700;
                         color:#1a1a2e; margin-bottom:20px; }
        .section-title span { color:#e94560; }
        .card { background:white; border-radius:12px;
                padding:25px; margin-bottom:25px;
                box-shadow:0 4px 15px rgba(0,0,0,0.08); }
        .card h3 { margin-bottom:15px; color:#1a1a2e; }
        .form-group { margin-bottom:15px; }
        .form-group label { display:block; margin-bottom:5px;
                            font-size:13px; font-weight:600; }
        .form-group input,
        .form-group select,
        .form-group textarea { width:100%; padding:10px 12px;
                               border:2px solid #e0e0e0;
                               border-radius:6px;
                               font-size:13px; }
        .grid-2 { display:grid;
                  grid-template-columns:1fr 1fr; gap:15px; }
        .table-container { background:white;
                           border-radius:12px; padding:25px;
                           box-shadow:0 4px 15px
                           rgba(0,0,0,0.08);
                           overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th { background:#1a1a2e; color:white;
             padding:12px 15px; text-align:left;
             font-size:13px; }
        td { padding:11px 15px;
             border-bottom:1px solid #f0f0f0;
             font-size:13px; }
        tr:hover { background:#f9f9f9; }
        .btn { padding:6px 14px; border-radius:5px;
               font-size:12px; font-weight:600;
               text-decoration:none; cursor:pointer;
               border:none; display:inline-block; }
        .btn-primary { background:#e94560; color:white; }
        .btn-warning { background:#ffc107; color:#333; }
        .btn-danger { background:#dc3545; color:white; }
        .btn-back { background:#1a1a2e; color:white;
                    padding:10px 20px; font-size:14px;
                    border-radius:8px; text-decoration:none;
                    display:inline-block; margin-top:20px; }
        footer { background:#1a1a2e; color:#aaa;
                 text-align:center; padding:20px;
                 margin-top:40px; font-size:13px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="brand" href="/home">🏙️ SmartCity</a>
    <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/admin" style="color:#e94560;">⚙️ Admin</a></li>
        <li><a href="/admin/users">Users</a></li>
        <li><a href="/admin/news">News</a></li>
        <li><a href="/auth/logout">Logout</a></li>
    </ul>
</nav>

<div class="section">
    <h2 class="section-title">
        🏢 Manage <span>Business</span>
    </h2>

    <div class="card">
        <h3>➕ Add New Business</h3>
        <form th:action="@{/admin/business/add}"
              th:object="${newBusiness}" method="post"
              xmlns:th="http://www.thymeleaf.org">
            <div class="grid-2">
                <div class="form-group">
                    <label>Business Name</label>
                    <input type="text" th:field="*{name}"
                           placeholder="Name" required/>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}">
                        <option value="HOTEL">Hotel</option>
                        <option value="RESTAURANT">Restaurant</option>
                        <option value="RETAIL">Retail</option>
                        <option value="BUSINESS">Business</option>
                        <option value="TOURISM">Tourism</option>
                        <option value="HOSPITAL">Hospital</option>
                        <option value="EDUCATION">Education</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" th:field="*{address}"
                       placeholder="Full address"/>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" rows="2"
                    placeholder="Short description"></textarea>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Latitude</label>
                    <input type="number" th:field="*{latitude}"
                           step="0.0001"
                           placeholder="e.g. 19.0760"/>
                </div>
                <div class="form-group">
                    <label>Longitude</label>
                    <input type="number" th:field="*{longitude}"
                           step="0.0001"
                           placeholder="e.g. 72.8777"/>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" th:field="*{phone}"
                           placeholder="Contact number"/>
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="text" th:field="*{website}"
                           placeholder="www.example.com"/>
                </div>
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox"
                           th:field="*{featured}"/>
                    &nbsp;Featured Business
                </label>
            </div>
            <button type="submit" class="btn btn-primary"
                    style="padding:10px 24px; font-size:14px;">
                Add Business
            </button>
        </form>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Address</th>
                    <th>Phone</th>
                    <th>Featured</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="biz : ${businesses}"
                    xmlns:th="http://www.thymeleaf.org">
                    <td th:text="${biz.id}">1</td>
                    <td th:text="${biz.name}">Name</td>
                    <td th:text="${biz.category}">Cat</td>
                    <td th:text="${#strings.abbreviate(biz.address,25)}">Addr</td>
                    <td th:text="${biz.phone}">Phone</td>
                    <td>
                        <span th:if="${biz.featured}"
                              style="color:#28a745;
                                     font-weight:600;">
                            ⭐ Yes
                        </span>
                        <span th:unless="${biz.featured}"
                              style="color:#999;">No</span>
                    </td>
                    <td>
                        <a th:href="@{/admin/business/edit/{id}(id=${biz.id})}" class="btn btn-warning">Edit</a>
                        &nbsp;
                        <a th:href="@{/admin/business/delete/{id}(id=${biz.id})}" class="btn btn-danger" onclick="return confirm('Delete?')">Delete</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
    <a href="/admin" class="btn-back">← Back to Dashboard</a>
</div>
<footer><p>© 2026 SmartCity Admin Panel</p></footer>
</body>
</html>
