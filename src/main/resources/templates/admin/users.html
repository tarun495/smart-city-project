<!DOCTYPE html>
<html>
<head>
    <title>Manage Users | SmartCity Admin</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Arial, sans-serif;
               background:#f4f6f9; color:#333; }
        .navbar { background:#1a1a2e; padding:15px 30px;
                  display:flex; justify-content:space-between;
                  align-items:center; }
        .navbar .brand { color:#e94560; font-size:22px;
                         font-weight:700;
                         text-decoration:none; }
        .navbar ul { list-style:none; display:flex;
                     gap:20px; }
        .navbar ul li a { color:#ccc; text-decoration:none;
                          font-size:14px; }
        .navbar ul li a:hover { color:#e94560; }
        .section { padding:40px 30px; }
        .section-title { font-size:26px; font-weight:700;
                         color:#1a1a2e; margin-bottom:25px; }
        .section-title span { color:#e94560; }
        .alert-success { background:#d4edda; color:#155724;
                         padding:12px 20px;
                         border-radius:8px;
                         margin-bottom:20px;
                         font-size:14px; }
        .alert-error { background:#f8d7da; color:#721c24;
                       padding:12px 20px;
                       border-radius:8px;
                       margin-bottom:20px;
                       font-size:14px; }
        .table-container { background:white;
                           border-radius:12px;
                           padding:25px;
                           box-shadow:0 4px 15px
                           rgba(0,0,0,0.08);
                           overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        th { background:#1a1a2e; color:white;
             padding:12px 15px; text-align:left;
             font-size:13px; }
        td { padding:11px 15px;
             border-bottom:1px solid #f0f0f0;
             font-size:13px; }
        tr:hover { background:#f9f9f9; }
        .btn { padding:6px 14px; border-radius:5px;
               font-size:12px; font-weight:600;
               text-decoration:none; cursor:pointer;
               border:none; display:inline-block; }
        .btn-danger { background:#dc3545; color:white; }
        .btn-back { background:#1a1a2e; color:white;
                    padding:10px 20px; font-size:14px;
                    border-radius:8px;
                    text-decoration:none;
                    display:inline-block;
                    margin-top:20px; }
        .badge-admin { background:#e94560; color:white;
                       padding:2px 8px; border-radius:10px;
                       font-size:11px; font-weight:600; }
        .badge-user { background:#1a1a2e; color:white;
                      padding:2px 8px; border-radius:10px;
                      font-size:11px; }
        footer { background:#1a1a2e; color:#aaa;
                 text-align:center; padding:20px;
                 margin-top:40px; font-size:13px; }
    </style>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/home">🏙️ SmartCity</a>
    <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/admin"
               style="color:#e94560;">⚙️ Admin</a></li>
        <li><a href="/admin/news">News</a></li>
        <li><a href="/admin/business">Business</a></li>
        <li><a href="/auth/logout">Logout</a></li>
    </ul>
</nav>

<div class="section">

    <!-- Flash Messages -->
    <div class="alert-success"
         th:if="${success}"
         th:text="${success}"
         xmlns:th="http://www.thymeleaf.org">
    </div>
    <div class="alert-error"
         th:if="${error}"
         th:text="${error}"
         xmlns:th="http://www.thymeleaf.org">
    </div>

    <h2 class="section-title">
        👥 Manage <span>Users</span>
    </h2>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Full Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>City</th>
                    <th>Type</th>
                    <th>Roles</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody xmlns:th="http://www.thymeleaf.org">
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td>
                        <strong th:text="${user.username}">
                            user
                        </strong>
                    </td>
                    <td th:text="${user.fullName}">Name</td>
                    <td th:text="${user.email}">email</td>
                    <td th:text="${user.phone}">phone</td>
                    <td th:text="${user.city}">city</td>
                    <td th:text="${user.userType}">type</td>
                    <td>
                        <span th:each="role : ${user.roles}">
                            <span th:if="${role.name == 'ROLE_ADMIN'}"
                                  class="badge-admin">
                                ADMIN
                            </span>
                            <span th:unless="${role.name == 'ROLE_ADMIN'}"
                                  class="badge-user">
                                USER
                            </span>
                        </span>
                    </td>
                    <td>
                        <a th:href="@{/admin/users/delete/{id}(id=${user.id})}"
                           class="btn btn-danger"
                           onclick="return confirm('Delete this user?')">
                            Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(users)}">
                    <td colspan="9"
                        style="text-align:center;
                               padding:20px; color:#999;">
                        No users found.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <a href="/admin" class="btn-back">
        ← Back to Dashboard
    </a>
</div>

<footer>
    <p>© 2026 SmartCity Admin Panel</p>
</footer>
</body>
</html>
