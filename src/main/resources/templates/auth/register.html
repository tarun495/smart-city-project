<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register | SmartCity</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar">
    <a class="brand" href="/home">🏙️ SmartCity</a>
    <ul>
        <li><a href="/home">Home</a></li>
        <li><a href="/map">City Map</a></li>
        <li><a href="/news">News</a></li>
        <li><a href="/business">Business</a></li>
        <li><a href="/forum">Forum</a></li>
        <li><a href="/search">Search</a></li>
        <li><a href="/auth/login">Login</a></li>
        <li><a href="/auth/register">Register</a></li>
    </ul>
</nav>

<div class="form-container" style="max-width:560px;">
    <h2>📝 Create Account</h2>

    <form th:action="@{/auth/register}"
          th:object="${user}" method="post">

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{fullName}"
                   placeholder="Your full name" required/>
            <div class="error"
                 th:if="${#fields.hasErrors('fullName')}"
                 th:errors="*{fullName}"></div>
        </div>
        <div class="form-group">
            <label>Username</label>
            <input type="text" th:field="*{username}"
                   placeholder="Choose a username" required/>
            <div class="error"
                 th:if="${usernameError}"
                 th:text="${usernameError}"></div>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}"
                   placeholder="your@email.com" required/>
            <div class="error"
                 th:if="${emailError}"
                 th:text="${emailError}"></div>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}"
                   placeholder="Minimum 6 characters" required/>
            <div class="error"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" th:field="*{phone}"
                   placeholder="Mobile number"/>
        </div>
        <div class="form-group">
            <label>City</label>
            <input type="text" th:field="*{city}"
                   placeholder="Your city"/>
        </div>
        <div class="form-group">
            <label>I am a</label>
            <select th:field="*{userType}">
                <option value="RESIDENT">Resident</option>
                <option value="TOURIST">Tourist</option>
                <option value="BUSINESSMAN">Businessman</option>
            </select>
        </div>

        <button type="submit"
                class="btn btn-primary form-submit">
            Create Account
        </button>
    </form>

    <p style="text-align:center; margin-top:20px; font-size:14px;">
        Already have an account?
        <a href="/auth/login"
           style="color:#e94560; font-weight:600;">
            Login here
        </a>
    </p>
</div>

<footer>
    <p>© 2026 SmartCity Portal</p>
</footer>
</body>
</html>
